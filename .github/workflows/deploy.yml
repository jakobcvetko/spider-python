# Build image → push to GHCR → deploy on Hetzner via SSH.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — server IP or hostname
#   DEPLOY_USER       — SSH user (e.g. deploy)
#   DEPLOY_SSH_KEY    — private key (PEM) for that user
#   DEPLOY_PATH       — deploy dir on server (e.g. /opt/spider)
#   GHCR_PULL_TOKEN   — optional; PAT with read:packages (only if GHCR image is private)
#
# One-time server setup: see deploy/README.md

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml,docker-compose.firecrawl.prod.yml,docker-compose.twenty.prod.yml,docker-compose.n8n.prod.yml,deploy/
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_PULL_TOKEN
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            if [[ -n "${GHCR_PULL_TOKEN:-}" ]]; then
              echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi
            export IMAGE_TAG
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml run --rm --no-deps api alembic upgrade head
            docker image prune -f
